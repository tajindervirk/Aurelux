<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <!-- Deep Cinematic Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A24" />
      <stop offset="100%" stop-color="#060609" />
    </linearGradient>

    <!-- Premium Metallic Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE6A0" />
      <stop offset="35%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8B6508" />
    </linearGradient>
    
    <!-- Slightly darker gold for depth on the right leg -->
    <linearGradient id="gold-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C775" />
      <stop offset="50%" stop-color="#B8942B" />
      <stop offset="100%" stop-color="#664903" />
    </linearGradient>

    <!-- Subtle Drop Shadow -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- App-style rounded square background -->
  <rect x="5" y="5" width="110" height="110" rx="26" fill="url(#bg)" stroke="#2A2A38" stroke-width="1.5"/>

  <!-- The Monolithic 'A' -->
  <g filter="url(#drop-shadow)">
    <!-- Left Leg -->
    <polygon points="51,25 60,25 42,90 24,90" fill="url(#gold)" />
    
    <!-- Right Leg -->
    <polygon points="60,25 69,25 96,90 78,90" fill="url(#gold-dark)" />
    
    <!-- Crossbar -->
    <polygon points="48,63 72,63 75,73 45,73" fill="url(#gold)" />
    
    <!-- Sharp Bevel Edge on the Left Leg -->
    <polygon points="51,25 53,25 26,90 24,90" fill="#FFFFFF" opacity="0.3" />
  </g>
</svg>
